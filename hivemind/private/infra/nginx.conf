# HiveMind AI — nginx reverse proxy config
# /etc/nginx/sites-available/hivemind
# Edit and reload: sudo nginx -s reload

upstream hivemind_workers {
    server 127.0.0.1:8080;
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
    server 127.0.0.1:8083;
}

server {
    listen 443 ssl;
    server_name api.hivemind-ai.com;

    ssl_certificate     /etc/ssl/hivemind/cert.pem;
    ssl_certificate_key /etc/ssl/hivemind/key.pem;

    # Rate limiting — 10 requests per second per client IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req zone=api_limit burst=20 nodelay;

    location /v1/ {
        proxy_pass http://hivemind_workers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://hivemind_workers;
        access_log off;
    }
}

server {
    listen 80;
    server_name api.hivemind-ai.com;
    return 301 https://$host$request_uri;
}
